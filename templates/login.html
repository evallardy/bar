{% extends 'base.html' %}

{% block title %}Acceso | Bar{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75">
    <div class="col-12 col-sm-10 col-md-7 col-lg-5">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden restaurant-card login-card-shell">
            <div class="card-body p-4 p-md-5">
                <p class="text-uppercase text-muted small mb-2">Sistema de barra</p>
                <h1 class="h3 mb-2 login-title">Acceso al bar</h1>
                <p class="text-muted mb-4">Ingresa para administrar comandas, preparación, barra y cobro del turno.</p>
                <form method="post" data-ajax="true" data-follow-redirect="true">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="id_username">Usuario</label>
                        <input class="form-control form-control-lg" type="text" name="username" id="id_username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="id_password">Contraseña</label>
                        <input class="form-control form-control-lg" type="password" name="password" id="id_password" required>
                    </div>
                    <button class="btn btn-dark btn-lg w-100" type="submit">Entrar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
{% if form.errors %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    if (window.showAppDialog) {
        window.showAppDialog('Usuario o contraseña incorrectos.', 'danger');
    }
});
</script>
{% endif %}
{% endblock %}
