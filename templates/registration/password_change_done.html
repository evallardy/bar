{% extends 'base.html' %}

{% block title %}Contraseña actualizada | Bar{% endblock %}

{% block content %}
<section class="bar-page-header rounded-4 p-4 p-lg-5 mb-4 overflow-hidden">
    <div class="page-header-layout">
        <p class="text-uppercase small mb-1 page-kicker">Seguridad</p>
        <h1 class="page-title mb-2">Contraseña actualizada</h1>
        <p class="page-copy mb-0">El cambio se registro correctamente y el acceso queda protegido con la nueva contraseña.</p>
    </div>
</section>

<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <a class="btn btn-dark" href="{% url 'home' %}">Volver al inicio</a>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function () {
    if (window.showAppDialog) {
        window.showAppDialog('Contraseña actualizada correctamente.', 'success');
    }
});
</script>
{% endblock %}
