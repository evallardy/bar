server {
    listen 80;
    server_name bar.iagmexico.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name bar.iagmexico.com;

    ssl_certificate /etc/letsencrypt/live/bar.iagmexico.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bar.iagmexico.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location /static/ {
        alias /srv/bar/app/staticfiles/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location /media/ {
        alias /srv/bar/app/media/;
        access_log off;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn-bar.sock;
        proxy_read_timeout 120;
        proxy_connect_timeout 120;
        proxy_redirect off;
    }
}
