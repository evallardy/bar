upstream __UPSTREAM_NAME__ {
    server unix:__GUNICORN_SOCKET__ fail_timeout=0;
}

server {
    server_name __SERVER_NAMES__;
    client_max_body_size 5M;
    access_log __LOGS_DIR__/nginx-access.log;
    error_log __LOGS_DIR__/nginx-error.log;

    location / {
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header Host $http_host;
        proxy_redirect off;
         proxy_pass_header Set-Cookie;
         proxy_pass http://__UPSTREAM_NAME__;
    }

    error_page 500 502 503 504 /templates/500.html;
}
