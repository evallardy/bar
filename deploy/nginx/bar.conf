server {
    listen 80;
    server_name bar.iagmexico.com;

    client_max_body_size 10M;

    location /static/ {
        alias /srv/bar/app/staticfiles/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location /media/ {
        alias /srv/bar/app/media/;
        access_log off;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn-bar.sock;
        proxy_read_timeout 120;
        proxy_connect_timeout 120;
        proxy_redirect off;
    }
}
